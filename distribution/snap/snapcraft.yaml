# Snap package definition — `snap install secretbank`.
# Run `snapcraft pack` after `pnpm tauri build` has produced the Linux
# binary at src-tauri/target/release/secretbank.

name: secretbank
base: core22
version: "0.1.0"
summary: Dependency-graph-aware secrets manager with supply-chain risk
description: |
  Secretbank is an open-core desktop secrets manager that goes beyond simple
  key storage. It maps how each API key relates to your projects,
  deployments, and URLs, so you always know the blast radius before you
  rotate or revoke. When NVD or GHSA reports a breach, it auto-matches the
  incident to credentials in your vault. The supply-chain scanner reads
  package.json, Cargo.toml and their lockfiles, then queries OSV.dev for
  any dep with secret-leak history.

grade: stable
confinement: strict
license: AGPL-3.0-or-later
website: https://secretbank.app
contact: support@secretbank.app
issues: https://github.com/phoodul/secretbank/issues

apps:
  secretbank:
    command: bin/secretbank
    desktop: usr/share/applications/secretbank.desktop
    common-id: app.secretbank
    extensions: [gnome]
    plugs:
      - home
      - network
      - desktop
      - desktop-legacy
      - x11
      - wayland
      - browser-support
      - opengl
      - audio-playback
      - password-manager-service # for OS keyring
  Secretbank:
    command: bin/Secretbank
    plugs:
      - home
      - network
      - password-manager-service

parts:
  secretbank:
    plugin: dump
    source: ../../src-tauri/target/release
    organize:
      secretbank: bin/secretbank
      Secretbank: bin/Secretbank
    stage:
      - bin/secretbank
      - bin/Secretbank
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libgtk-3-0
      - libayatana-appindicator3-1
      - librsvg2-2
      - libssl3
  desktop-file:
    plugin: dump
    source: .
    organize:
      secretbank.desktop: usr/share/applications/secretbank.desktop
      icon.png: usr/share/icons/hicolor/512x512/apps/secretbank.png
