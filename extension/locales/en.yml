# Secretbank Extension — English (en) locale
# @wxt-dev/i18n YAML format → auto-generated _locales/en/messages.json at build time
# Phase A5: 인프라 최소 placeholder 셋. 실제 메시지는 Phase B/C/D/E 에서 추가.

popup_title:
  message: "Secretbank"
  description: "Extension popup title"

popup_greeting:
  message: "Manage your secrets"
  description: "Greeting shown in popup header"

pairing_start:
  message: "Connect to Desktop"
  description: "Button label to initiate desktop pairing"

save_button:
  message: "Save Secret"
  description: "Button label to save a detected credential"

cancel_button:
  message: "Cancel"
  description: "Generic cancel button label"

settings_title:
  message: "Settings"
  description: "Settings page title"

vault_locked:
  message: "Vault is locked"
  description: "Status message when the vault is locked"

vault_unlocked:
  message: "Vault is unlocked"
  description: "Status message when the vault is unlocked"

credential_list_empty:
  message: "No secrets saved yet"
  description: "Empty state for the credential list"

copy_to_clipboard:
  message: "Copy to clipboard"
  description: "Tooltip or aria-label for copy button"

# ── A6: popup Tab names ──
popup_tabs_pairing:
  message: "Pairing"
  description: "Tab label for the desktop pairing tab"

popup_tabs_credentials:
  message: "Credentials"
  description: "Tab label for the credentials list tab"

popup_tabs_save:
  message: "Save"
  description: "Tab label for the save credential tab"

popup_tabs_settings:
  message: "Settings"
  description: "Tab label for the settings tab"

popup_theme_toggle:
  message: "Toggle theme"
  description: "Aria-label for the light/dark theme toggle button"

# ── A6: placeholder messages ──
popup_placeholder_pairing:
  message: "Desktop pairing coming in Phase B. Connect the extension to your Secretbank desktop app."
  description: "Placeholder shown in PairingDialog before Phase B is implemented"

popup_placeholder_credentials:
  message: "Credential list coming in Phase C. Your saved secrets will appear here."
  description: "Placeholder shown in CredentialList before Phase C is implemented"

popup_placeholder_save:
  message: "Save dialog coming in Phase D. Detected credentials will be saved here."
  description: "Placeholder shown in SaveDialog before Phase D is implemented"

popup_placeholder_settings:
  message: "Settings coming in Phase E. Configure your extension preferences here."
  description: "Placeholder shown in Settings before Phase E is implemented"

# ── B-5: PairingDialog 상태 메시지 ──
pairing_pending:
  message: "Waiting for desktop approval…"
  description: "Status shown while awaiting desktop app pairing confirmation"

pairing_paired:
  message: "Paired"
  description: "Status badge shown when pairing is complete"

pairing_error_not_installed:
  message: "Desktop app is not installed. Please install Secretbank and try again."
  description: "Error message when the native messaging host is not found"

pairing_error_rejected:
  message: "Pairing was rejected by the desktop app."
  description: "Error message when the user rejected the pairing in the desktop app"

pairing_error_timeout:
  message: "Pairing timed out. Make sure the desktop app is running."
  description: "Error message when pairing did not complete within the timeout"

pairing_error_protocol:
  message: "Pairing failed due to a protocol error."
  description: "Error message for unexpected message format errors"

pairing_fingerprint_label:
  message: "Device ID"
  description: "Label shown before the paired device ID"

pairing_repair_button:
  message: "Re-pair"
  description: "Button to trigger a new pairing flow when already paired"

pairing_open_app:
  message: "Make sure the Secretbank desktop app is running."
  description: "Help text shown in error state to guide the user"
