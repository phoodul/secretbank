session_settings_title:
  message: "Session Timeout"
  description: "Section heading for extension session timeout settings"

session_ttl_label:
  message: "Auto-expire after"
  description: "Label for the session TTL radio group"

session_ttl_description:
  message: "Password reveals stay unlocked for this long. Changing this setting will immediately invalidate all active sessions."
  description: "Description for the session TTL setting"

session_ttl_mins30:
  message: "30 minutes"
  description: "Session TTL option: 30 minutes"

