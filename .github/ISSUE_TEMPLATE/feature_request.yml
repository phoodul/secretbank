name: 💡 Feature request
description: 새 기능 / 통합 / 사용성 개선 제안
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        제안 감사합니다. 큰 아이디어 / 토론은 [Discussions → Ideas](https://github.com/phoodul/secretbank/discussions/categories/ideas) 가 더 적합할 수 있습니다.

  - type: textarea
    id: problem
    attributes:
      label: 어떤 문제를 해결하나요?
      description: 현재 무엇이 불편한가요? 어느 워크플로우에서 막히나요?
      placeholder: "Stripe API key 를 rotate 할 때 어느 service 가 영향받는지 외부 도구 없이 알 수 없음"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 제안하는 해결책
      description: 이상적으로 어떻게 동작했으면 하나요? UI / CLI / API 형태 모두 환영.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안 / 검토한 다른 접근
      description: 우회 방법은? 다른 도구는 어떻게 처리하나요?
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 본인에게 얼마나 중요?
      options:
        - "🔥 매일 막힘 — 이 기능 없으면 사용 불가"
        - "⭐ 자주 필요 — 다른 도구로 우회 중"
        - "🌱 있으면 좋음 — nice-to-have"
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: 기여 의향
      options:
        - label: 이 기능 직접 PR 보낼 의향 있습니다 (CLA 서명 후)
        - label: 디자인 / UI 시안 contribute 가능
        - label: 테스트 / 피드백 제공 가능
