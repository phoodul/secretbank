# Dependabot version updates + 보안 알림 커버리지.
# 보안 알림은 의존성 그래프 기반이며, 여기 등록된 매니페스트(특히 커밋된
# src-tauri/Cargo.lock)가 그래프에 올라가야 cargo 취약점도 감지된다.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# 운용 정책 (2026-06-14):
#  - groups: 생태계마다 minor+patch 를 1개 PR 로 묶어 PR 눈덩이 방지.
#    major 는 그룹 제외 → 개별 PR → 사람이 검토(.github/workflows/dependabot-auto-merge.yml
#    이 major 는 auto-merge 하지 않음).
#  - cooldown: 갓 배포된(침해 가능성 있는) 버전을 즉시 채택하지 않도록 지연.
#    시크릿 매니저 supply-chain 방어. 보안 업데이트(security-updates)는 cooldown 미적용 = 즉시.
#  - auto-merge: patch/minor 는 CI 4개 필수 체크 통과 + cooldown 경과 후 자동 머지.
# (Dependabot 은 YAML 앵커/커스텀 키를 지원하지 않으므로 cooldown 을 항목마다 인라인)
version: 2
updates:
  # --- Rust (Tauri 백엔드 워크스페이스) ---
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 5
      semver-patch-days: 3
      semver-minor-days: 5
      semver-major-days: 7
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # rand/rand_core 0.9 는 chacha20poly1305(aead) 가 rand_core 0.6 을 잠그고
      # 있어 채택 불가 — OsRng 가 aead::rand_core 0.6 의 RngCore/CryptoRng trait 를
      # 구현하지 않아 E0277. aead/chacha20poly1305/age 스택이 rand_core 0.9 로
      # 올라올 때까지 보류 (2026-06-29 결정, docs/project-decisions.md ADR).
      # 0.8.x patch 는 계속 허용. >=0.9 만 차단.
      - dependency-name: "rand"
        versions: [">=0.9.0"]
      - dependency-name: "rand_core"
        versions: [">=0.9.0"]

  # --- npm: 루트 pnpm 워크스페이스 (앱 프론트엔드 + extension + packages/shared) ---
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 5
      semver-patch-days: 3
      semver-minor-days: 5
      semver-major-days: 7
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  # --- npm: EE Cloudflare Worker relay (독립 pnpm 프로젝트) ---
  - package-ecosystem: "npm"
    directory: "/ee/secretbank-relay"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 5
      semver-patch-days: 3
      semver-minor-days: 5
      semver-major-days: 7
    groups:
      relay-minor-patch:
        update-types: ["minor", "patch"]

  # --- npm: EE download-proxy (독립 pnpm 프로젝트) ---
  - package-ecosystem: "npm"
    directory: "/ee/cloudflare/download-proxy"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 5
      semver-patch-days: 3
      semver-minor-days: 5
      semver-major-days: 7
    groups:
      download-proxy-minor-patch:
        update-types: ["minor", "patch"]

  # --- npm: VS Code 확장 (자체 package-lock.json) ---
  - package-ecosystem: "npm"
    directory: "/vscode-extension"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 5
      semver-patch-days: 3
      semver-minor-days: 5
      semver-major-days: 7
    groups:
      vscode-minor-patch:
        update-types: ["minor", "patch"]

  # --- GitHub Actions (워크플로우 액션 버전 — CLA @v2 같은 이동 태그 사고 방지) ---
  # NOTE: github-actions 생태계는 cooldown 의 semver-*-days 세분 키를 지원하지
  # 않는다(액션은 semver 를 엄격히 따르지 않음). default-days 만 사용.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 5
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]
