name: Deploy Relay

on:
  push:
    branches: [main]
    paths:
      - "ee/api-vault-relay/**"
      - ".github/workflows/deploy-relay.yml"
  workflow_dispatch:

concurrency:
  group: deploy-relay
  cancel-in-progress: false

jobs:
  test:
    name: Test (typecheck + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ee/api-vault-relay
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ee/api-vault-relay/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  deploy:
    name: Deploy to Cloudflare Workers
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ee/api-vault-relay
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ee/api-vault-relay/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: ee/api-vault-relay
