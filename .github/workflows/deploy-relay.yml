name: Deploy Relay

on:
  push:
    branches: [main]
    paths:
      - "ee/api-vault-relay/**"
      - ".github/workflows/deploy-relay.yml"
  workflow_dispatch:

concurrency:
  group: deploy-relay
  cancel-in-progress: false

jobs:
  test:
    name: Test (typecheck + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ee/api-vault-relay
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ee/api-vault-relay/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  deploy:
    name: Deploy to Cloudflare Workers
    needs: test
    # Cloudflare 계정 + API token 등록 전까지 skip.
    # 활성화 시: GitHub repo Settings → Secrets and variables → Actions →
    #   Variables 탭 → "RELAY_DEPLOY_ENABLED" = "true" 설정.
    # 그리고 Secrets 탭에 CLOUDFLARE_API_TOKEN 등록.
    if: ${{ vars.RELAY_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ee/api-vault-relay
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ee/api-vault-relay/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: ee/api-vault-relay
