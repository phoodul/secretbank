name: Deploy Relay

on:
  push:
    branches: [main]
    paths:
      - "ee/secretbank-relay/**"
      - ".github/workflows/deploy-relay.yml"
  workflow_dispatch:

concurrency:
  group: deploy-relay
  cancel-in-progress: false

jobs:
  test:
    name: Test (typecheck + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ee/secretbank-relay
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ee/secretbank-relay/pnpm-lock.yaml

      - name: Install dependencies
        # --ignore-workspace: ee/secretbank-relay 는 root pnpm-workspace.yaml
        # (., extension, packages/*) 외부. 이 flag 없이 install 하면 pnpm 이
        # root workspace 만 인식 → ee/secretbank-relay/node_modules 가 빈 채로
        # typecheck 가 @cloudflare/workers-types 못 찾음.
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  deploy:
    name: Deploy to Cloudflare Workers
    needs: test
    # Cloudflare 계정 + API token 등록 전까지 skip.
    # 활성화 시: GitHub repo Settings → Secrets and variables → Actions →
    #   Variables 탭 → "RELAY_DEPLOY_ENABLED" = "true" 설정.
    # 그리고 Secrets 탭에 CLOUDFLARE_API_TOKEN 등록.
    if: ${{ vars.RELAY_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ee/secretbank-relay
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ee/secretbank-relay/pnpm-lock.yaml

      - name: Install dependencies
        # --ignore-workspace: ee/secretbank-relay 는 root pnpm-workspace.yaml
        # (., extension, packages/*) 외부. 이 flag 없이 install 하면 pnpm 이
        # root workspace 만 인식 → ee/secretbank-relay/node_modules 가 빈 채로
        # typecheck 가 @cloudflare/workers-types 못 찾음.
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: ee/secretbank-relay
