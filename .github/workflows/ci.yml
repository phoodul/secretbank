name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust (fmt / clippy / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Tauri / wry 가 link 하는 Linux native libraries.
      # 없으면 glib-sys / webkit2gtk-sys 가 pkg-config 단계에서 fail.
      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Cache cargo target
        uses: actions/cache@v6.1.0
        with:
          path: src-tauri/target
          # Cargo.lock 커밋됨 — lock hash 로 key 생성 (의존성 변경 시 자동 invalidate)
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all --manifest-path src-tauri/Cargo.toml -- --check

      # --locked: 커밋된 Cargo.lock 을 강제. 의존성 재해석 금지 → 재현 빌드 +
      # transitive 신규(broken) 릴리스 자동 채택 방지. lock 갱신 필요 시 CI fail.
      - name: cargo clippy
        run: cargo clippy --workspace --locked --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: cargo test
        run: cargo test --workspace --locked --manifest-path src-tauri/Cargo.toml

  frontend:
    name: Frontend (typecheck / lint / format / vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Vitest
        run: pnpm test --run

  e2e:
    name: E2E smoke (Playwright browser-mode)
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        run: pnpm e2e:install

      - name: Run Playwright smoke tests
        run: pnpm e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  ee-relay:
    name: EE Relay (typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ee/secretbank-relay
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ee/secretbank-relay/pnpm-lock.yaml

      - name: Install dependencies
        # ee/secretbank-relay 는 root pnpm-workspace.yaml 멤버가 아니므로
        # --ignore-workspace 로 자체 pnpm-lock.yaml 만 사용. (workspace install
        # 시 멤버 미등록으로 ee 자체 dependencies 가 hoist 되지 않아 typecheck
        # 의 @cloudflare/workers-types 등을 찾지 못한다.)
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test
