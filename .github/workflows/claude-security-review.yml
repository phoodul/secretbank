# Claude Code Security Review (opt-in via `claude-review` label)
#
# anthropics/claude-code-security-review 사용
# PR review와 별도로 보안 취약점만 전담 — 퍼블릭 OSS에서 권장

name: Claude Security Review

on:
  pull_request_target:
    types: [labeled, synchronize]

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: claude-security-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  security:
    if: |
      github.event.sender.type != 'Bot' &&
      contains(github.event.pull_request.labels.*.name, 'claude-review') &&
      (
        github.event.pull_request.head.repo.full_name == github.repository ||
        contains(github.event.pull_request.labels.*.name, 'safe-to-review')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run Claude security review
        uses: anthropics/claude-code-security-review@main
        with:
          claude-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          comment-pr: true
          # severity-threshold: medium  # 기본값. low|medium|high|critical
