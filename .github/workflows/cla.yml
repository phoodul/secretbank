# Requires manual setup: install CLA Assistant bot via org admin
# https://github.com/contributor-assistant/github-action
# Also set PERSONAL_ACCESS_TOKEN secret in repository settings:
#   Settings → Secrets and variables → Actions → New repository secret
#   Name: PERSONAL_ACCESS_TOKEN  Value: <PAT with repo scope>

name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # TODO: Create a PAT with repo scope and add it as PERSONAL_ACCESS_TOKEN secret
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: "signatures/version1/cla.json"
          path-to-document: "https://github.com/phoodul/api-vault/blob/main/.github/CLA.md"
          branch: "main"
          allowlist: "dependabot[bot]"
          lock-pullrequest-aftermerge: false
