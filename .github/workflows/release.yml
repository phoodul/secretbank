name: Release

# Triggers when a `v*` tag is pushed (e.g. `v0.1.0`).
# Builds Tauri bundles for Windows / macOS (universal) / Linux and uploads
# them to a GitHub Release. The desktop installer + tauri-updater manifest
# end up on https://github.com/phoodul/secretbank/releases.
#
# Manual workflow_dispatch supports `dry_run` mode — builds all platforms
# without creating a GitHub Release; bundles are uploaded as workflow
# artifacts for inspection. Use this to verify the pipeline (Rust toolchain,
# Tauri bundle, signing secrets) before pushing the first real tag.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # 수동 트리거 (긴급 hotfix 또는 dry-run 빌드 검증)
    inputs:
      tag:
        description: "Release tag (vX.Y.Z) — dry_run 일 때는 placeholder OK"
        required: false
        default: "v0.0.0-dryrun"
      dry_run:
        description: "Dry run — 빌드만 검증, GitHub Release 생성/업로드 안 함"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  create-release:
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v6

      - name: Read version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft release
        id: create
        uses: actions/github-script@v9
        with:
          script: |
            const tag = "${{ steps.version.outputs.tag }}";
            const r = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Secretbank ${tag}`,
              body: `See [CHANGELOG](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CHANGELOG.md) for details.`,
              draft: true,
              prerelease: tag.includes("-"),
            });
            return r.data.id;

  build-tauri:
    needs: create-release
    if: ${{ always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          # Cargo.lock 은 .gitignore 라 hashFiles 가 비어 stale cache 공유 → 모든
          # version bump 후 prerelease "secretbank-charter ^0.1.0" 매칭 fail.
          # Cargo.toml 들의 hash 로 key 생성 → version bump 시 자동 invalidate.
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('src-tauri/**/Cargo.toml') }}
          restore-keys: ${{ matrix.platform }}-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Build — dry-run / real release 모두 동일한 직접 호출.
      # tauri-action 을 우회하는 이유: APPLE_*/WINDOWS_CERTIFICATE secrets 가
      # 미등록 (빈 문자열) 일 때 tauri-action 이 빈 identity 로 codesign 시도하다
      # 실패. 직접 pnpm tauri build 호출하면 unset env 로 안전하게 unsigned 빌드.
      - name: Build Tauri bundle
        shell: bash
        run: pnpm tauri build ${{ matrix.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # Dry-run path — workflow artifacts 로만 캡처
      - name: Upload bundle artifacts (dry run)
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v7
        with:
          name: bundle-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*
            src-tauri/target/universal-apple-darwin/release/bundle/**/*
          if-no-files-found: warn

      # 빌드 산출물 진단 — 어느 파일이 실제로 만들어졌는지 명시적으로 표시.
      # Windows 의 .nsis.zip / .nsis.zip.sig 가 누락되는 원인 파악 위해 추가됨.
      - name: List bundle artifacts (diagnostic)
        if: ${{ always() }}
        shell: bash
        run: |
          echo "==== src-tauri/target/release/bundle/ ===="
          ls -laR src-tauri/target/release/bundle/ 2>&1 || echo "[diag] bundle dir not present"
          echo "==== src-tauri/target/universal-apple-darwin/release/bundle/ ===="
          ls -laR src-tauri/target/universal-apple-darwin/release/bundle/ 2>&1 || echo "[diag] universal bundle dir not present"

      # Real release path — bundle 들 + .sig 파일들을 GitHub Release 에 직접 upload.
      # macOS 는 universal-apple-darwin 경로 추가 처리.
      - name: Upload bundles to GitHub Release
        if: ${{ !inputs.dry_run }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
        run: |
          set -euo pipefail
          # macOS 의 bash 3.2 는 globstar 미지원. 본 스크립트는 **/ 안 쓰니 nullglob 만.
          shopt -s nullglob

          BUNDLE_DIR="src-tauri/target/release/bundle"
          UNIVERSAL_DIR="src-tauri/target/universal-apple-darwin/release/bundle"

          # 모든 가능한 산출물 경로 (확장된 패턴 — Tauri v2 의 다양한 updater
          # 출력 형식 모두 포함: .nsis.zip / .exe.sig / .msi.sig 등).
          declare -a CANDIDATES=(
            "$BUNDLE_DIR"/dmg/*.dmg
            "$BUNDLE_DIR"/macos/*.app.tar.gz
            "$BUNDLE_DIR"/macos/*.app.tar.gz.sig
            "$BUNDLE_DIR"/nsis/*.exe
            "$BUNDLE_DIR"/nsis/*.exe.sig
            "$BUNDLE_DIR"/nsis/*.nsis.zip
            "$BUNDLE_DIR"/nsis/*.nsis.zip.sig
            "$BUNDLE_DIR"/msi/*.msi
            "$BUNDLE_DIR"/msi/*.msi.sig
            "$BUNDLE_DIR"/msi/*.msi.zip
            "$BUNDLE_DIR"/msi/*.msi.zip.sig
            "$BUNDLE_DIR"/deb/*.deb
            "$BUNDLE_DIR"/appimage/*.AppImage
            "$BUNDLE_DIR"/appimage/*.AppImage.sig
            "$BUNDLE_DIR"/appimage/*.AppImage.tar.gz
            "$BUNDLE_DIR"/appimage/*.AppImage.tar.gz.sig
            "$BUNDLE_DIR"/rpm/*.rpm
            "$UNIVERSAL_DIR"/dmg/*.dmg
            "$UNIVERSAL_DIR"/macos/*.app.tar.gz
            "$UNIVERSAL_DIR"/macos/*.app.tar.gz.sig
          )

          UPLOADED=0
          for f in "${CANDIDATES[@]}"; do
            [ -e "$f" ] || continue
            echo "Uploading: $f"
            gh release upload "$TAG" "$f" --clobber
            UPLOADED=$((UPLOADED + 1))
          done

          echo "[upload] $UPLOADED files uploaded"
          if [ "$UPLOADED" -eq 0 ]; then
            echo "::error::No bundle artifacts found to upload"
            ls -laR "$BUNDLE_DIR" "$UNIVERSAL_DIR" 2>/dev/null || true
            exit 1
          fi

  # Tauri updater manifest 생성 — bundle 들의 .sig 파일을 모아 latest.json 합성.
  # auto-updater 가 이 파일을 polling 해서 새 버전 감지.
  publish-updater-manifest:
    needs: build-tauri
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # checkout step 없이 gh CLI 가 repo 를 알아낼 수 있도록.
          # 없으면 "fatal: not a git repository" 로 실패.
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
        shell: bash
        run: |
          set -eu
          # NOTE: pipefail 의도적으로 비활성화 — jq | head 조합에서 SIGPIPE 로
          # 가짜 실패 트리거 가능. 본 step 은 빈 출력에 관대.
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          VERSION="${TAG#v}"
          BASE="https://secretbank.app/download/$TAG"
          WORK=$(mktemp -d)

          echo "[manifest] tag=$TAG version=$VERSION work=$WORK"

          # 모든 .sig 파일 다운로드 (tag 의 release 에서)
          gh release download "$TAG" --pattern "*.sig" --dir "$WORK" 2>&1 || echo "[manifest] no .sig files (or download failed)"
          echo "[manifest] downloaded files:"
          ls -la "$WORK" 2>/dev/null || true

          # asset 목록 가져와서 platform 별 분류 (jq 안에서 first/// empty 사용)
          ASSETS_JSON=$(gh release view "$TAG" --json assets 2>&1) || {
            echo "[manifest] gh release view failed: $ASSETS_JSON"
            exit 1
          }
          echo "[manifest] assets:"
          echo "$ASSETS_JSON" | jq -r '.assets[].name' || true

          # endswith() 사용 — regex 의 backslash escape 지옥 회피.
          pick() {
            echo "$ASSETS_JSON" | jq -r --arg suffix "$1" '[.assets[].name | select(endswith($suffix))][0] // empty'
          }

          DARWIN_TAR=$(pick ".app.tar.gz")
          DARWIN_SIG_NAME=$(pick ".app.tar.gz.sig")
          # Tauri v2 Windows 는 .nsis.zip 안 만들고 .exe 자체에 .sig 만 추가.
          # NSIS installer (-setup.exe) 가 곧 updater payload.
          WINDOWS_NSIS=$(pick "-setup.exe")
          WINDOWS_SIG_NAME=$(pick "-setup.exe.sig")
          LINUX_APPIMAGE=$(pick ".AppImage")
          LINUX_SIG_NAME=$(pick ".AppImage.sig")

          echo "[manifest] picked:"
          echo "  darwin_tar=$DARWIN_TAR  sig=$DARWIN_SIG_NAME"
          echo "  windows_nsis=$WINDOWS_NSIS  sig=$WINDOWS_SIG_NAME"
          echo "  linux_appimage=$LINUX_APPIMAGE  sig=$LINUX_SIG_NAME"

          read_sig() {
            local f="$WORK/$1"
            if [ -n "$1" ] && [ -f "$f" ]; then
              cat "$f"
            else
              echo ""
            fi
          }
          DARWIN_SIG=$(read_sig "$DARWIN_SIG_NAME")
          WINDOWS_SIG=$(read_sig "$WINDOWS_SIG_NAME")
          LINUX_SIG=$(read_sig "$LINUX_SIG_NAME")

          # platform 객체 동적 구성 — bundle 이 없는 플랫폼은 빠짐
          PLATFORMS=$(jq -n \
            --arg darwin_url    "${DARWIN_TAR:+$BASE/$DARWIN_TAR}" \
            --arg darwin_sig    "$DARWIN_SIG" \
            --arg windows_url   "${WINDOWS_NSIS:+$BASE/$WINDOWS_NSIS}" \
            --arg windows_sig   "$WINDOWS_SIG" \
            --arg linux_url     "${LINUX_APPIMAGE:+$BASE/$LINUX_APPIMAGE}" \
            --arg linux_sig     "$LINUX_SIG" \
            '
            ($darwin_url  | length > 0) as $hasDarwin |
            ($windows_url | length > 0) as $hasWindows |
            ($linux_url   | length > 0) as $hasLinux |
            {} +
            (if $hasDarwin then {
                "darwin-x86_64":  {url: $darwin_url,  signature: $darwin_sig},
                "darwin-aarch64": {url: $darwin_url,  signature: $darwin_sig}
              } else {} end) +
            (if $hasWindows then {
                "windows-x86_64": {url: $windows_url, signature: $windows_sig}
              } else {} end) +
            (if $hasLinux then {
                "linux-x86_64":   {url: $linux_url,   signature: $linux_sig}
              } else {} end)
            ')

          jq -n \
            --arg version  "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg notes    "Secretbank $TAG — see CHANGELOG.md" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > latest.json

          echo "==== Generated latest.json ===="
          cat latest.json
          echo "================================"

          gh release upload "$TAG" latest.json --clobber

      # NOTE: 옛 "site/{latest,releases}.json 을 main 에 commit+push" step 제거됨.
      # secretbank.app/api/latest + /releases.json 는 relay Worker (ee/secretbank-relay
      # /src/routes/site-api.ts) 가 GitHub Release asset 을 라이브 stream/proxy 하므로
      # 정적 site/*.json 을 읽는 소비자가 없다. push step 은 branch protection
      # (required status checks) 에 막혀 매 release 실패 → publish-release(draft→public)
      # 까지 skip 시키던 redundant dead code 였다. 위 latest.json asset 업로드만으로
      # auto-updater + site download grid 모두 충족.

  publish-release:
    needs: [create-release, build-tauri, publish-updater-manifest]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });

  publish-vscode-extension:
    needs: build-tauri
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run && !contains(github.ref_name, '-') }} # dry-run / pre-release skip
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install
        run: npm ci || npm install

      - name: Compile
        run: npm run compile

      - name: Package
        run: npx --yes @vscode/vsce package

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        if: env.VSCE_PAT != ''
        run: npx --yes @vscode/vsce publish --pat "$VSCE_PAT"

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        if: env.OVSX_PAT != ''
        run: npx --yes ovsx publish --pat "$OVSX_PAT"
