name: Release

# Triggers when a `v*` tag is pushed (e.g. `v0.1.0`).
# Builds Tauri bundles for Windows / macOS (universal) / Linux and uploads
# them to a GitHub Release. The desktop installer + tauri-updater manifest
# end up on https://github.com/phoodul/api-vault/releases.
#
# Manual workflow_dispatch supports `dry_run` mode — builds all platforms
# without creating a GitHub Release; bundles are uploaded as workflow
# artifacts for inspection. Use this to verify the pipeline (Rust toolchain,
# Tauri bundle, signing secrets) before pushing the first real tag.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # 수동 트리거 (긴급 hotfix 또는 dry-run 빌드 검증)
    inputs:
      tag:
        description: "Release tag (vX.Y.Z) — dry_run 일 때는 placeholder OK"
        required: false
        default: "v0.0.0-dryrun"
      dry_run:
        description: "Dry run — 빌드만 검증, GitHub Release 생성/업로드 안 함"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  create-release:
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = "${{ steps.version.outputs.tag }}";
            const r = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `API Vault ${tag}`,
              body: `See [CHANGELOG](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CHANGELOG.md) for details.`,
              draft: true,
              prerelease: tag.includes("-"),
            });
            return r.data.id;

  build-tauri:
    needs: create-release
    if: ${{ always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ matrix.platform }}-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Build — dry-run / real release 모두 동일한 직접 호출.
      # tauri-action 을 우회하는 이유: APPLE_*/WINDOWS_CERTIFICATE secrets 가
      # 미등록 (빈 문자열) 일 때 tauri-action 이 빈 identity 로 codesign 시도하다
      # 실패. 직접 pnpm tauri build 호출하면 unset env 로 안전하게 unsigned 빌드.
      - name: Build Tauri bundle
        shell: bash
        run: pnpm tauri build ${{ matrix.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # Dry-run path — workflow artifacts 로만 캡처
      - name: Upload bundle artifacts (dry run)
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*
            src-tauri/target/universal-apple-darwin/release/bundle/**/*
          if-no-files-found: warn

      # Real release path — bundle 들 + .sig 파일들을 GitHub Release 에 직접 upload.
      # macOS 는 universal-apple-darwin 경로 추가 처리.
      - name: Upload bundles to GitHub Release
        if: ${{ !inputs.dry_run }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
        run: |
          set -euo pipefail
          # macOS 의 bash 3.2 는 globstar 미지원. 본 스크립트는 **/ 안 쓰니 nullglob 만.
          shopt -s nullglob

          BUNDLE_DIR="src-tauri/target/release/bundle"
          UNIVERSAL_DIR="src-tauri/target/universal-apple-darwin/release/bundle"

          # 모든 가능한 산출물 경로
          declare -a CANDIDATES=(
            "$BUNDLE_DIR"/dmg/*.dmg
            "$BUNDLE_DIR"/macos/*.app.tar.gz
            "$BUNDLE_DIR"/macos/*.app.tar.gz.sig
            "$BUNDLE_DIR"/nsis/*.exe
            "$BUNDLE_DIR"/nsis/*.nsis.zip
            "$BUNDLE_DIR"/nsis/*.nsis.zip.sig
            "$BUNDLE_DIR"/msi/*.msi
            "$BUNDLE_DIR"/msi/*.msi.zip
            "$BUNDLE_DIR"/msi/*.msi.zip.sig
            "$BUNDLE_DIR"/deb/*.deb
            "$BUNDLE_DIR"/appimage/*.AppImage
            "$BUNDLE_DIR"/appimage/*.AppImage.sig
            "$BUNDLE_DIR"/rpm/*.rpm
            "$UNIVERSAL_DIR"/dmg/*.dmg
            "$UNIVERSAL_DIR"/macos/*.app.tar.gz
            "$UNIVERSAL_DIR"/macos/*.app.tar.gz.sig
          )

          UPLOADED=0
          for f in "${CANDIDATES[@]}"; do
            [ -e "$f" ] || continue
            echo "Uploading: $f"
            gh release upload "$TAG" "$f" --clobber
            UPLOADED=$((UPLOADED + 1))
          done

          echo "[upload] $UPLOADED files uploaded"
          if [ "$UPLOADED" -eq 0 ]; then
            echo "::error::No bundle artifacts found to upload"
            ls -laR "$BUNDLE_DIR" "$UNIVERSAL_DIR" 2>/dev/null || true
            exit 1
          fi

  # Tauri updater manifest 생성 — bundle 들의 .sig 파일을 모아 latest.json 합성.
  # auto-updater 가 이 파일을 polling 해서 새 버전 감지.
  publish-updater-manifest:
    needs: build-tauri
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          VERSION="${TAG#v}"
          BASE="https://github.com/${{ github.repository }}/releases/download/$TAG"
          WORK=$(mktemp -d)

          # 모든 .sig 파일 다운로드 (tag 의 release 에서)
          gh release download "$TAG" --pattern "*.sig" --dir "$WORK" 2>&1 || true
          ls -la "$WORK" || true

          # asset 목록 가져와서 platform 별 분류
          ASSETS_JSON=$(gh release view "$TAG" --json assets)
          pick() { echo "$ASSETS_JSON" | jq -r ".assets[].name | select(test(\"$1\"))" | head -1; }

          DARWIN_TAR=$(pick "\\.app\\.tar\\.gz$")
          DARWIN_SIG_NAME=$(pick "\\.app\\.tar\\.gz\\.sig$")
          WINDOWS_NSIS=$(pick "\\.nsis\\.zip$")
          WINDOWS_SIG_NAME=$(pick "\\.nsis\\.zip\\.sig$")
          LINUX_APPIMAGE=$(pick "\\.AppImage$")
          LINUX_SIG_NAME=$(pick "\\.AppImage\\.sig$")

          read_sig() {
            local f="$WORK/$1"
            if [ -n "$1" ] && [ -f "$f" ]; then
              cat "$f"
            else
              echo ""
            fi
          }
          DARWIN_SIG=$(read_sig "$DARWIN_SIG_NAME")
          WINDOWS_SIG=$(read_sig "$WINDOWS_SIG_NAME")
          LINUX_SIG=$(read_sig "$LINUX_SIG_NAME")

          # platform 객체 동적 구성 — bundle 이 없는 플랫폼은 빠짐
          PLATFORMS=$(jq -n \
            --arg darwin_url    "${DARWIN_TAR:+$BASE/$DARWIN_TAR}" \
            --arg darwin_sig    "$DARWIN_SIG" \
            --arg windows_url   "${WINDOWS_NSIS:+$BASE/$WINDOWS_NSIS}" \
            --arg windows_sig   "$WINDOWS_SIG" \
            --arg linux_url     "${LINUX_APPIMAGE:+$BASE/$LINUX_APPIMAGE}" \
            --arg linux_sig     "$LINUX_SIG" \
            '
            ($darwin_url  | length > 0) as $hasDarwin |
            ($windows_url | length > 0) as $hasWindows |
            ($linux_url   | length > 0) as $hasLinux |
            {} +
            (if $hasDarwin then {
                "darwin-x86_64":  {url: $darwin_url,  signature: $darwin_sig},
                "darwin-aarch64": {url: $darwin_url,  signature: $darwin_sig}
              } else {} end) +
            (if $hasWindows then {
                "windows-x86_64": {url: $windows_url, signature: $windows_sig}
              } else {} end) +
            (if $hasLinux then {
                "linux-x86_64":   {url: $linux_url,   signature: $linux_sig}
              } else {} end)
            ')

          jq -n \
            --arg version  "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg notes    "API Vault $TAG — see CHANGELOG.md" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > latest.json

          echo "==== Generated latest.json ===="
          cat latest.json
          echo "================================"

          gh release upload "$TAG" latest.json --clobber

  publish-release:
    needs: [create-release, build-tauri, publish-updater-manifest]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });

  publish-vscode-extension:
    needs: build-tauri
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run && !contains(github.ref_name, '-') }} # dry-run / pre-release skip
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci || npm install

      - name: Compile
        run: npm run compile

      - name: Package
        run: npx --yes @vscode/vsce package

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        if: env.VSCE_PAT != ''
        run: npx --yes @vscode/vsce publish --pat "$VSCE_PAT"

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        if: env.OVSX_PAT != ''
        run: npx --yes ovsx publish --pat "$OVSX_PAT"
