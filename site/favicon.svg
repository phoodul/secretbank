<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 40 40"
  role="img"
  aria-label="Secretbank — vault unlock"
>
  <defs>
    <radialGradient id="vault-backdrop" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0.95" />
      <stop offset="60%" stop-color="#0f1c4a" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="vault-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f4d369" stop-opacity="0.7" />
      <stop offset="40%" stop-color="#d4af37" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#b8932b" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="vault-brass" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#fde68a" />
      <stop offset="35%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#7c5e1a" />
    </radialGradient>
    <linearGradient id="sweep-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a6cf7" stop-opacity="0" />
      <stop offset="60%" stop-color="#4a6cf7" stop-opacity="0.3" />
      <stop offset="95%" stop-color="#60a5fa" stop-opacity="1" />
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="1" />
    </linearGradient>
    <filter id="vault-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="0.8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <circle cx="20" cy="20" r="19.5" fill="url(#vault-backdrop)" />

  <circle
    cx="20"
    cy="20"
    r="17.5"
    fill="none"
    stroke="#d4af37"
    stroke-width="0.4"
    stroke-dasharray="0.8 2.4"
    opacity="0.55"
  />

  <g stroke="#f4d369" stroke-width="0.7" stroke-linecap="round" opacity="0.9">
    <line x1="20" y1="2.5" x2="20" y2="5.5" />
    <line x1="37.5" y1="20" x2="34.5" y2="20" />
    <line x1="20" y1="37.5" x2="20" y2="34.5" />
    <line x1="2.5" y1="20" x2="5.5" y2="20" />
  </g>

  <g>
    <path
      d="M 20 5 A 15 15 0 0 1 32 14"
      stroke="url(#sweep-grad)"
      stroke-width="1.2"
      fill="none"
      stroke-linecap="round"
      filter="url(#vault-glow)"
    />
    <circle cx="32" cy="14" r="0.9" fill="#93c5fd" filter="url(#vault-glow)" />
  </g>

  <polygon
    points="20,9 29.5,14.5 29.5,25.5 20,31 10.5,25.5 10.5,14.5"
    fill="#1e3a8a"
    fill-opacity="0.55"
    stroke="#d4af37"
    stroke-width="0.6"
  />

  <g stroke="#d4af37" stroke-width="0.5" stroke-linecap="round" opacity="0.75">
    <line x1="20" y1="10" x2="20" y2="14" />
    <line x1="27.7" y1="14.5" x2="24.3" y2="16.5" />
    <line x1="27.7" y1="25.5" x2="24.3" y2="23.5" />
    <line x1="20" y1="30" x2="20" y2="26" />
    <line x1="12.3" y1="25.5" x2="15.7" y2="23.5" />
    <line x1="12.3" y1="14.5" x2="15.7" y2="16.5" />
  </g>

  <circle cx="20" cy="20" r="6.5" fill="url(#vault-halo)" />

  <circle
    cx="20"
    cy="20"
    r="4"
    fill="url(#vault-brass)"
    stroke="#7c5e1a"
    stroke-width="0.2"
  />
  <ellipse cx="19" cy="19" rx="1.1" ry="0.7" fill="#fef9c3" opacity="0.7" />

  <circle
    cx="20"
    cy="20"
    r="1.4"
    fill="#fef3c7"
    filter="url(#vault-glow)"
  />
  <circle cx="20" cy="20" r="0.5" fill="#ffffff" />
</svg>
