<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Secretbank user guide — install, credentials, dependency graph, supply-chain scan, Vault Charter recovery, CLI, MCP, VS Code extension."
    />
    <title>Secretbank — User Guide</title>
    <link rel="canonical" href="https://secretbank.app/guide.html" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #fafbff;
        --fg: #0a1628;
        --fg-muted: #4a5568;
        --fg-subtle: #6b7280;
        --lapis: #2563eb;
        --lapis-bright: #3b82f6;
        --gold: #b8932b;
        --glass-bg: rgba(255, 255, 255, 0.55);
        --glass-bg-strong: rgba(255, 255, 255, 0.75);
        --glass-border: rgba(10, 22, 40, 0.08);
        --code-bg: #f1f5f9;
        --code-fg: #0f172a;
        --code-block-bg: #0f172a;
        --code-block-fg: #e2e8f0;
        --gradient-1: linear-gradient(135deg, #2563eb 0%, #6366f1 50%, #d4af37 100%);
      }
      [data-theme="dark"] {
        --bg: #050810;
        --fg: #f0f4ff;
        --fg-muted: #94a3b8;
        --fg-subtle: #64748b;
        --lapis: #4a6cf7;
        --lapis-bright: #60a5fa;
        --gold: #d4af37;
        --glass-bg: rgba(255, 255, 255, 0.04);
        --glass-bg-strong: rgba(255, 255, 255, 0.08);
        --glass-border: rgba(255, 255, 255, 0.1);
        --code-bg: rgba(255, 255, 255, 0.06);
        --code-fg: #f0f4ff;
        --code-block-bg: rgba(0, 0, 0, 0.4);
        --code-block-fg: #e2e8f0;
        --gradient-1: linear-gradient(135deg, #4a6cf7 0%, #818cf8 50%, #f4d369 100%);
      }
      * {
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        margin: 0;
        font-family:
          "Inter",
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          "Noto Sans CJK SC",
          "Noto Sans CJK KR",
          sans-serif;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
      }
      code,
      pre {
        font-family: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      }
      a {
        color: var(--lapis-bright);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }

      /* ─── Header bar ─── */
      header.guide-header {
        position: sticky;
        top: 0;
        z-index: 50;
        background: var(--glass-bg);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border-bottom: 1px solid var(--glass-border);
      }
      .header-inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0.85rem 1.5rem;
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .header-inner .home {
        font-weight: 800;
        font-size: 1rem;
        color: var(--fg);
      }
      .header-inner .crumb {
        opacity: 0.55;
        font-size: 0.85rem;
      }
      .header-inner .spacer {
        flex: 1;
      }
      .lang-group {
        display: inline-flex;
        background: var(--glass-bg-strong);
        border: 1px solid var(--glass-border);
        border-radius: 10px;
        padding: 3px;
        gap: 2px;
      }
      .lang-btn {
        background: transparent;
        border: 0;
        color: var(--fg);
        cursor: pointer;
        font: inherit;
        font-size: 0.85rem;
        font-weight: 500;
        padding: 0.4rem 0.75rem;
        border-radius: 7px;
        opacity: 0.65;
        transition:
          background 0.15s,
          opacity 0.15s;
      }
      .lang-btn:hover {
        opacity: 0.95;
      }
      .lang-btn[aria-current="true"] {
        background: var(--gradient-1);
        color: #fff;
        opacity: 1;
      }
      .header-inner button.action {
        background: var(--glass-bg-strong);
        border: 1px solid var(--glass-border);
        border-radius: 10px;
        color: var(--fg);
        cursor: pointer;
        font: inherit;
        font-size: 0.82rem;
        font-weight: 500;
        padding: 0.45rem 0.85rem;
        transition: background 0.15s;
      }
      .header-inner button.action:hover {
        background: var(--glass-bg);
      }

      /* ─── Layout ─── */
      .page {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem 1.5rem 4rem;
        display: grid;
        grid-template-columns: 240px 1fr;
        gap: 2.5rem;
      }
      @media (max-width: 900px) {
        .page {
          grid-template-columns: 1fr;
        }
        nav.toc {
          display: none;
        }
      }
      nav.toc {
        position: sticky;
        top: 5rem;
        align-self: start;
        max-height: calc(100vh - 6rem);
        overflow-y: auto;
        font-size: 0.84rem;
        padding-right: 0.5rem;
      }
      nav.toc h4 {
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        opacity: 0.55;
        margin: 0 0 0.6rem;
      }
      nav.toc a {
        display: block;
        color: var(--fg);
        opacity: 0.7;
        padding: 0.3rem 0;
        border-left: 2px solid transparent;
        padding-left: 0.6rem;
        transition:
          opacity 0.15s,
          border-color 0.15s;
        text-decoration: none;
      }
      nav.toc a:hover,
      nav.toc a.active {
        opacity: 1;
        border-color: var(--lapis-bright);
      }

      /* ─── Article (rendered markdown) ─── */
      article {
        min-width: 0;
        font-size: 0.95rem;
      }
      article .loading {
        opacity: 0.55;
        text-align: center;
        padding: 4rem;
      }
      article .error {
        opacity: 0.7;
        background: rgba(220, 38, 38, 0.06);
        border: 1px solid rgba(220, 38, 38, 0.25);
        padding: 1rem 1.25rem;
        border-radius: 10px;
      }
      article h1 {
        font-size: 2.1rem;
        font-weight: 800;
        letter-spacing: -0.025em;
        margin: 0 0 1rem;
        line-height: 1.2;
      }
      article h2 {
        font-size: 1.4rem;
        font-weight: 700;
        letter-spacing: -0.015em;
        margin: 3rem 0 1rem;
        padding-top: 1rem;
        border-top: 1px solid var(--glass-border);
      }
      article h3 {
        font-size: 1.1rem;
        font-weight: 700;
        margin: 2rem 0 0.75rem;
      }
      article h4 {
        font-size: 0.95rem;
        font-weight: 700;
        margin: 1.5rem 0 0.5rem;
        opacity: 0.85;
      }
      article p {
        margin: 0 0 1rem;
      }
      article blockquote {
        border-left: 3px solid var(--gold);
        padding: 0.6rem 1rem;
        margin: 1rem 0;
        background: rgba(212, 175, 55, 0.06);
        border-radius: 0 8px 8px 0;
      }
      article blockquote p {
        margin: 0.3rem 0;
      }
      article ul,
      article ol {
        padding-left: 1.5rem;
        margin: 0 0 1rem;
      }
      article li {
        margin: 0.3rem 0;
      }
      article code {
        background: var(--code-bg);
        color: var(--code-fg);
        padding: 0.1rem 0.4rem;
        border-radius: 5px;
        font-size: 0.86em;
      }
      article pre {
        background: var(--code-block-bg);
        color: var(--code-block-fg);
        padding: 1rem 1.25rem;
        border-radius: 10px;
        overflow-x: auto;
        margin: 1rem 0;
        font-size: 0.85rem;
        line-height: 1.55;
      }
      article pre code {
        background: transparent;
        color: inherit;
        padding: 0;
        font-size: inherit;
      }
      article table {
        width: 100%;
        border-collapse: collapse;
        margin: 1rem 0;
        font-size: 0.88rem;
      }
      article th,
      article td {
        padding: 0.55rem 0.85rem;
        text-align: left;
        border-bottom: 1px solid var(--glass-border);
      }
      article th {
        font-weight: 700;
        background: var(--glass-bg);
      }
      article tr:hover td {
        background: var(--glass-bg);
      }
      article hr {
        border: 0;
        border-top: 1px solid var(--glass-border);
        margin: 2rem 0;
      }
      article :target {
        scroll-margin-top: 5rem;
      }

      /* Print — clean PDF output */
      @media print {
        @page {
          margin: 1.2in 0.85in;
        }
        body {
          background: #fff;
          color: #0a1628;
        }
        header.guide-header,
        nav.toc {
          display: none;
        }
        .page {
          display: block;
          padding: 0;
        }
        article {
          font-size: 11pt;
        }
        article h2 {
          page-break-before: auto;
          break-before: avoid;
        }
        article pre,
        article table,
        article blockquote {
          page-break-inside: avoid;
          break-inside: avoid;
        }
        a {
          color: #1e3a8a;
        }
        article pre {
          background: #f1f5f9;
          color: #0f172a;
          border: 1px solid #e2e8f0;
        }
      }
    </style>
  </head>
  <body>
    <header class="guide-header">
      <div class="header-inner">
        <a href="/" class="home">Secretbank</a>
        <span class="crumb">/ User Guide</span>
        <span class="spacer"></span>
        <div class="lang-group" role="tablist" aria-label="Language">
          <button class="lang-btn" type="button" data-lang="en" aria-current="true">English</button>
          <button class="lang-btn" type="button" data-lang="ko" aria-current="false">한국어</button>
          <button class="lang-btn" type="button" data-lang="zh" aria-current="false">
            简体中文
          </button>
        </div>
        <button class="action" type="button" id="print-btn" title="Print or save as PDF">
          Save as PDF
        </button>
        <a class="action" id="raw-link" href="#" target="_blank" rel="noopener">Raw .md</a>
      </div>
    </header>

    <main class="page">
      <nav class="toc" id="toc">
        <h4>On this page</h4>
        <div id="toc-list"></div>
      </nav>
      <article id="content">
        <p class="loading">Loading guide…</p>
      </article>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
    <script>
      (function () {
        const SUPPORTED = ["en", "ko", "zh"];
        const LANG_DOC_LANG = { en: "en", ko: "ko", zh: "zh-CN" };
        const RAW_BASE =
          "https://raw.githubusercontent.com/phoodul/secretbank/main/docs/USER_GUIDE.";

        // ── Theme: respect ?theme= or system. Persist to localStorage same as index.html.
        (function initTheme() {
          const stored = localStorage.getItem("Secretbank-theme");
          const prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
          document.documentElement.setAttribute(
            "data-theme",
            stored ?? (prefersLight ? "light" : "dark"),
          );
        })();

        function getLangFromUrl() {
          const sp = new URLSearchParams(location.search);
          const q = (sp.get("lang") || "").toLowerCase();
          if (SUPPORTED.includes(q)) return q;
          // Fallback: navigator language → ko/zh/en
          const nav = (navigator.language || "en").toLowerCase();
          if (nav.startsWith("ko")) return "ko";
          if (nav.startsWith("zh")) return "zh";
          return "en";
        }

        function setLangInUrl(lang) {
          const url = new URL(location.href);
          url.searchParams.set("lang", lang);
          history.replaceState(null, "", url.toString());
        }

        function slugify(text) {
          return String(text)
            .toLowerCase()
            .trim()
            .replace(/[\s—–]+/g, "-")
            .replace(/[^\p{L}\p{N}-]+/gu, "")
            .replace(/-+/g, "-")
            .replace(/^-|-$/g, "");
        }

        function renderToc(article) {
          const list = document.getElementById("toc-list");
          if (!list) return;
          list.innerHTML = "";
          const headings = article.querySelectorAll("h2");
          for (const h of headings) {
            if (!h.id) h.id = slugify(h.textContent || "");
            const a = document.createElement("a");
            a.href = "#" + h.id;
            a.textContent = h.textContent;
            list.appendChild(a);
          }
          // Highlight current section in TOC on scroll
          if ("IntersectionObserver" in window && headings.length > 0) {
            const links = list.querySelectorAll("a");
            const map = new Map();
            links.forEach((a, i) => map.set(headings[i].id, a));
            const io = new IntersectionObserver(
              (entries) => {
                for (const e of entries) {
                  if (e.isIntersecting) {
                    links.forEach((a) => a.classList.remove("active"));
                    const a = map.get(e.target.id);
                    if (a) a.classList.add("active");
                  }
                }
              },
              { rootMargin: "-20% 0px -65% 0px" },
            );
            headings.forEach((h) => io.observe(h));
          }
        }

        async function loadGuide(lang) {
          const article = document.getElementById("content");
          const title = "Secretbank — User Guide";
          document.title = title + " (" + lang.toUpperCase() + ")";
          document.documentElement.lang = LANG_DOC_LANG[lang] || lang;

          // Update lang button state
          for (const btn of document.querySelectorAll(".lang-btn")) {
            btn.setAttribute("aria-current", btn.dataset.lang === lang ? "true" : "false");
          }
          // Update raw link
          const raw = document.getElementById("raw-link");
          if (raw) raw.href = RAW_BASE + lang + ".md";

          article.innerHTML = '<p class="loading">Loading…</p>';
          try {
            const res = await fetch(RAW_BASE + lang + ".md", { cache: "no-cache" });
            if (!res.ok) throw new Error("HTTP " + res.status);
            const md = await res.text();

            // Configure marked: GFM, github-style headings.
            marked.setOptions({ gfm: true, breaks: false });
            article.innerHTML = marked.parse(md);

            // Open external links in new tab
            for (const a of article.querySelectorAll("a[href]")) {
              const href = a.getAttribute("href");
              if (href && /^https?:\/\//.test(href)) {
                a.setAttribute("target", "_blank");
                a.setAttribute("rel", "noopener noreferrer");
              }
            }

            renderToc(article);

            // Honor #anchor on initial load (after render)
            if (location.hash) {
              const el = document.getElementById(location.hash.slice(1));
              if (el) el.scrollIntoView({ behavior: "instant", block: "start" });
            }
          } catch (err) {
            article.innerHTML =
              '<div class="error">Couldn\'t load the guide. ' +
              '<a href="' +
              RAW_BASE +
              lang +
              '.md" target="_blank" rel="noopener">Open raw markdown on GitHub →</a></div>';
          }
        }

        // Wire up controls
        for (const btn of document.querySelectorAll(".lang-btn")) {
          btn.addEventListener("click", function () {
            const lang = this.dataset.lang;
            setLangInUrl(lang);
            loadGuide(lang);
          });
        }
        const printBtn = document.getElementById("print-btn");
        if (printBtn) {
          printBtn.addEventListener("click", function () {
            window.print();
          });
        }

        // Initial load
        loadGuide(getLangFromUrl());
      })();
    </script>
  </body>
</html>
