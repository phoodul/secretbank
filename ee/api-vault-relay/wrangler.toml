name = "api-vault-relay"
main = "src/index.ts"
compatibility_date = "2026-04-25"
compatibility_flags = ["nodejs_compat"]
account_id = "6f04212fcad5f073ed4e36af9b723eea"  # docs/runbooks/relay-deployment.md 참조

# 운영 도메인 — 사용자가 wrangler 콘솔에서 custom domain 연결 후 활성화
# routes = [
#   { pattern = "relay.api-vault.app/*", custom_domain = true }
# ]

[[d1_databases]]
binding = "DB"
database_name = "api-vault-relay"
database_id = "5884cbdd-dd49-4472-80ae-0e0ae2996105"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "TOKEN_CACHE"
id = "fc136f6dcd6344e5819ce536a2ec70db"

[vars]
# public — 시크릿 아님. GitHub App 등록 후 여기에 직접 입력.
GITHUB_APP_ID = ""
LOG_LEVEL = "info"

# WebAuthn / Auth — production 배포 시 사용자 도메인으로 교체
RP_ID = "localhost"
RP_NAME = "API Vault"
# 콤마 구분. Tauri prod webview 는 tauri://localhost, vite dev 는 http://localhost:1420.
RP_ORIGINS = "tauri://localhost,http://localhost:1420,http://localhost:8787"

# OAuth public 메타 — client_id 는 시크릿 아님 (검색해도 OK)
GITHUB_OAUTH_CLIENT_ID = "Ov23liEmEgn4idIvCFqb"
GOOGLE_OAUTH_CLIENT_ID = "112705184289-8urc35jb0g9gsaa5pp0ukn6347qkkhns.apps.googleusercontent.com"

# secrets (wrangler secret put 으로 주입) — production
# GITHUB_APP_PRIVATE_KEY        RS256 PEM
# GITHUB_WEBHOOK_SECRET         webhook 서명 검증용
# JWT_SIGNING_KEY               HMAC HS256 secret (32+ chars)
# GITHUB_OAUTH_CLIENT_SECRET    OAuth code → access_token 교환용
# GOOGLE_OAUTH_CLIENT_SECRET    OAuth code → access_token 교환용
